      description: Core ESL mental model for authoring and reviewing consumer code.
    - label: Reference
      name: references/esl-review.md
      file: esl/references/esl-review.md
      source: packages/esl/skills/esl/references/esl-review.md
      description: Review checklist for host model, imports, lifecycle, decorators, and traversal.

